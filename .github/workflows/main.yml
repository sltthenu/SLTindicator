name: test flow
on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: "manual trigger"
        required: true
        type: choice
        default: functional
        options:
          - functional
          - regression

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run selected test suite
        run: echo "Running ${{ github.event.inputs.test_suite }} tests"
